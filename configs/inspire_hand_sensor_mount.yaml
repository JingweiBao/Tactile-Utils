# Initial Inspire hand tactile mounting estimates for the pick_and_place_img_tactile dataset.
# Units:
#   xyz: meters in parent_link frame
#   rpy: radians
#   size_mm: sensor footprint height/width in millimeters, matching grid_shape rows/cols
#
# These are editable calibration seeds, not hardware-ground-truth extrinsics.

sensors:
  left_little_finger_tip_sensor:
    source_key: observation.tactiles.left_tactile_little_finger_tip
    side: left
    parent_link: pinky_tip
    xyz: [0.0, 0.0, 0.0]
    rpy: [0.0, 0.0, 0.0]
    size_mm: [9.0, 9.0]
    grid_shape: [3, 3]
    semantic_region: left_little_finger_tip
  left_little_finger_nail_sensor:
    source_key: observation.tactiles.left_tactile_little_finger_nail
    side: left
    parent_link: pinky_intermediate
    xyz: [0.0, -0.026, -0.011]
    rpy: [0.0, 0.0, 0.0]
    size_mm: [12.0, 8.0]
    grid_shape: [12, 8]
    semantic_region: left_little_finger_nail
  left_little_finger_pad_sensor:
